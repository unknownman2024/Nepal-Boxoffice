name: Sri Lanka Boxoffice Scraper

on:
  schedule:
    - cron: "0 * * * *"   # Runs every hour
  workflow_dispatch:      # Allow manual trigger

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1   # Shallow clone for speed

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install curl_cffi cloudscraper requests

    - name: Run Scraper
      env:
        CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}
        CF_BM: ${{ secrets.CF_BM }}
      run: |
        echo "🚀 Running Sri Lanka Boxoffice Script..."
        python "srilankadailybo.py"

    - name: Check for changes
      id: check_changes
      run: |
        git config --global user.name "GitHub Bot"
        git config --global user.email "actions@github.com"
        if [[ -n $(git status --porcelain) ]]; then
          echo "changes_detected=true" >> $GITHUB_ENV
        else
          echo "changes_detected=false" >> $GITHUB_ENV
        fi

    - name: Commit & Push Results
      if: env.changes_detected == 'true'
      run: |
        git add .
        git commit -m "📊 Auto-update: Sri Lanka Boxoffice ($(date '+%d-%m-%Y %I:%M %p'))"
        git pull --rebase
        git push
