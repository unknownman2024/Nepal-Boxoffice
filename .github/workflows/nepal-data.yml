name: Nepal Boxoffice Aggregator

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "Nepal Boxoffice/**"
      - "nepaldata.py"
      - ".github/workflows/nepal-data.yml"

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: nepal-boxoffice
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Aggregator
        run: |
          python nepaldata.py \
            --base-dir "Nepal Boxoffice" \
            --out "Nepal Data"

      - name: Detect Changes
        id: changes
        run: |
          git add "Nepal Data/"

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "update nepal boxoffice data"

      - name: Push Changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin HEAD:main
